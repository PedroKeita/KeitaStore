name: CI

on: 
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    test-api:
        name: Testes do Backend (API)
        runs-on: ubuntu-latest


        services:
            postgres:
                image: postgres:17
                env: 
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: keitastore_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: 'npm'
                cache-dependency-path: api/package-lock.json
            
            - name: Instalar dependências
              working-directory: api
              run: npm install
              
            - name: Rodar migrations
              working-directory: api
              env:
                 DATABASE_URL: postgresql://postgres:postgres@localhost:5432/keitastore_test
              run: npx prisma migrate deploy
            
            - name: Rodar testes
              working-directory: api
              env:
                DATABASE_URL: postgresql://postgres:postgres@localhost:5432/keitastore_test
                JWT_SECRET: test_secret
                GOOGLE_CLIENT_ID: test_client_id
                GOOGLE_CLIENT_SECRET: test_client_secret
              run: npm run test

